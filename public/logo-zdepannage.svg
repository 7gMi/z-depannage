<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" fill="none">
  <!-- Z letter (orange) - cabine avec traits de vitesse -->
  <g fill="#EA580C">
    <!-- Z barre haute -->
    <polygon points="30,28 155,28 155,52 30,52"/>
    <!-- Z diagonale -->
    <polygon points="125,52 155,52 65,140 35,140"/>
    <!-- Z barre basse -->
    <polygon points="30,140 155,140 155,164 30,164"/>
    <!-- Traits de vitesse sur Z -->
    <line x1="18" y1="65" x2="45" y2="65" stroke="#EA580C" stroke-width="6" stroke-linecap="round"/>
    <line x1="10" y1="85" x2="50" y2="85" stroke="#EA580C" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="105" x2="45" y2="105" stroke="#EA580C" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- D letter (bleu) - forme la cabine du camion -->
  <g fill="#1E40AF">
    <!-- D montant vertical -->
    <rect x="130" y="28" width="28" height="136" rx="2"/>
    <!-- D courbe (cabine) -->
    <path d="M158,28 L158,164 Q220,164 220,96 Q220,28 158,28 Z"/>
    <!-- Fenêtre cabine (découpe) -->
    <rect x="162" y="48" width="36" height="40" rx="4" fill="white" opacity="0.15"/>
  </g>

  <!-- EPANNAGE texte (bleu) -->
  <text x="228" y="118" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-weight="800" font-size="56" fill="#1E40AF" letter-spacing="3">EPANNAGE</text>

  <!-- Plateau du camion (bleu) -->
  <g fill="#1E40AF">
    <!-- Ligne de base -->
    <rect x="28" y="168" width="490" height="4" rx="2"/>
    <!-- Plateau arrière -->
    <rect x="220" y="145" width="250" height="24" rx="3"/>
    <!-- Bandes diagonales sur le plateau -->
    <line x1="250" y1="145" x2="260" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
    <line x1="290" y1="145" x2="300" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
    <line x1="330" y1="145" x2="340" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
    <line x1="370" y1="145" x2="380" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
    <line x1="410" y1="145" x2="420" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
    <line x1="440" y1="145" x2="450" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
    <line x1="460" y1="145" x2="470" y2="169" stroke="white" stroke-width="3" opacity="0.3"/>
  </g>

  <!-- Roues (bleu foncé) -->
  <g>
    <circle cx="100" cy="180" r="14" fill="#0F1B2D"/>
    <circle cx="100" cy="180" r="8" fill="#1E40AF"/>
    <circle cx="100" cy="180" r="4" fill="white" opacity="0.3"/>

    <circle cx="260" cy="180" r="14" fill="#0F1B2D"/>
    <circle cx="260" cy="180" r="8" fill="#1E40AF"/>
    <circle cx="260" cy="180" r="4" fill="white" opacity="0.3"/>

    <circle cx="440" cy="180" r="14" fill="#0F1B2D"/>
    <circle cx="440" cy="180" r="8" fill="#1E40AF"/>
    <circle cx="440" cy="180" r="4" fill="white" opacity="0.3"/>
  </g>
</svg>
